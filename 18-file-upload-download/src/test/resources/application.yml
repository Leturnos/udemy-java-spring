server:
  port: 8888 # porta de testes
cors:
  originPatterns: http://localhost:8080,http://localhost:3000,https://www.google.com
file:
  upload-dir: Programacao/udemy-java-spring/upload-dir
spring:
  application:
    name: spring-boot
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # url, username e password - classe de configuração(AbstractIntegrationTest) vai gerar
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
      show-sql: false
    open-in-view: false
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 200MB
      max-request-size: 224MB
logging:
  level:
    root: INFO
springdoc:
  paths-to-match: /api/**/v1/**
  swagger-ui:
    use-root-path: true